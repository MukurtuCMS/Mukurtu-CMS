      value: |
        <h2>A sample heading</h2>
        <p>This is placeholder body text used only to test accessibility of headings, paragraphs, lists, and links on a related content page.</p>
        <ul>
          <li>Sample list item one</li>
          <li>Sample list item two</li>
        </ul>
        <p>Here is a <a href="/">sample link back to the homepage</a> for link-text testing.</p>
