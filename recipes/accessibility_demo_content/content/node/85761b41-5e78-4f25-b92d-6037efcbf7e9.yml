# for accessibility testing. See ../../README.md.
_meta:
  version: '1.0'
  entity_type: node
  uuid: 85761b41-5e78-4f25-b92d-6037efcbf7e9
  bundle: article
  default_langcode: en
default:
  title:
    -
      value: 'Sample Related Story (placeholder)'
  status:
    -
      value: true
  promote:
    -
      value: false
  sticky:
    -
      value: false
  uid:
    -
      target_id: 1
  revision_uid:
    -
      target_id: 1
  moderation_state:
