services:
  mukurtu_gin_custom.route_subscriber:
    class: Drupal\mukurtu_gin_custom\Routing\MukurtuGinRouteSubscriber
    tags:
      - { name: event_subscriber }

  mukurtu_gin_custom.lb_frontend_edit_subscriber:
    class: Drupal\mukurtu_gin_custom\EventSubscriber\LbFrontendEditSubscriber
    tags:
      - { name: event_subscriber }

  mukurtu_gin_custom.choose_block_redirect_subscriber:
    class: Drupal\mukurtu_gin_custom\EventSubscriber\ChooseBlockRedirectSubscriber
    arguments:
      - '@class_resolver'
    tags:
      - { name: event_subscriber }

  mukurtu_gin_custom.lb_offcanvas_messages_subscriber:
    class: Drupal\mukurtu_gin_custom\EventSubscriber\LbOffCanvasMessagesSubscriber
    tags:
      - { name: event_subscriber }

  # Override Gin's navigation service to use Mukurtu's media view route.
  # Gin calls \Drupal::classResolver(GinNavigation::class); registering a
  # service with that fully-qualified class name as the service ID causes the
  # class resolver to return this instance instead of instantiating GinNavigation
  # directly.
  Drupal\gin\GinNavigation:
    class: Drupal\mukurtu_gin_custom\MukurtuGinNavigation
    arguments:
      - '@current_user'
      - '@entity_type.manager'
      - '@breadcrumb'
      - '@current_route_match'
      - '@menu.link_tree'
      - '@module_handler'
