services:
  mukurtu_core.route_subscriber:
    class: Drupal\mukurtu_core\Routing\RouteSubscriber
    tags:
      - { name: event_subscriber }
  mukurtu_core.dashboard_block_access_subscriber:
    class: Drupal\mukurtu_core\EventSubscriber\DashboardBlockAccessSubscriber
    arguments: ['@current_user']
    tags:
      - { name: event_subscriber }
  mukurtu_core.config_save_cache_invalidation_subscriber:
    class: Drupal\mukurtu_core\EventSubscriber\ConfigSaveCacheInvalidationSubscriber
    tags:
      - { name: event_subscriber }
