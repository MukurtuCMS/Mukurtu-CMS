mukurtu_core.node.quick_publish:
  path: '/admin/content/{node}/publish'
  defaults:
    _controller: '\Drupal\mukurtu_core\Controller\NodeQuickActionsController::publish'
    _title: 'Publish'
  options:
    parameters:
      node:
        type: entity:node
  requirements:
    _csrf_token: 'TRUE'
    _node_access: 'node.update'

mukurtu_core.node.quick_unpublish:
  path: '/admin/content/{node}/unpublish'
  defaults:
    _controller: '\Drupal\mukurtu_core\Controller\NodeQuickActionsController::unpublish'
    _title: 'Unpublish'
  options:
    parameters:
      node:
        type: entity:node
  requirements:
    _csrf_token: 'TRUE'
    _node_access: 'node.update'

mukurtu_core.settings_assorted:
  path: '/admin/config/mukurtu/settings'
  defaults:
    _form: '\Drupal\mukurtu_core\Form\MukurtuSettingsForm'
    _title: 'Mukurtu Settings'
  requirements:
    _permission: 'administer site configuration'

mukurtu_core.add_page:
  path: '/admin/node/add'
  defaults:
    _title: 'Add content'
    _controller: '\Drupal\mukurtu_core\Controller\MukurtuManageContentController::addPage'
  options:
    _node_operation_route: TRUE
  requirements:
    _entity_create_any_access: 'node'

mukurtu_core.add:
  path: '/admin/node/add/{node_type}'
  defaults:
    _entity_form: 'node.default'
    _title_callback: '\Drupal\node\Controller\NodeController::addPageTitle'
  requirements:
    _entity_create_access: 'node:{node_type}'
  options:
    _node_operation_route: TRUE
    parameters:
      node_type:
        type: entity:node_type
        with_config_overrides: TRUE


mukurtu_core.approve_user:
  path: '/user/{uid}/approve'
  defaults:
    _controller: '\Drupal\mukurtu_core\Controller\MukurtuUserController::approveAjax'
    _title: 'Approve User'
  requirements:
    _custom_access: '\Drupal\mukurtu_core\Controller\MukurtuUserController::access'
    uid: \d+

mukurtu_core.block_user:
  path: '/user/{uid}/block'
  defaults:
    _controller: '\Drupal\mukurtu_core\Controller\MukurtuUserController::blockAjax'
    _title: 'Block User'
  requirements:
    _custom_access: '\Drupal\mukurtu_core\Controller\MukurtuUserController::access'
    uid: \d+

mukurtu_core.set_pending_user:
  path: '/user/{uid}/set-pending'
  defaults:
    _controller: '\Drupal\mukurtu_core\Controller\MukurtuUserController::setPendingAjax'
    _title: 'Set to Pending'
  requirements:
    _custom_access: '\Drupal\mukurtu_core\Controller\MukurtuUserController::access'
    uid: \d+

mukurtu_core.content_found_in:
  path: '/node/{node}/found-in'
  defaults:
    _title: 'Found In'
    _controller: '\Drupal\mukurtu_core\Controller\ContentFoundInController::content'
  options:
    parameters:
      node:
        type: entity:node
  requirements:
    _custom_access: '\Drupal\mukurtu_core\Controller\ContentFoundInController::access'

mukurtu_core.media_found_in:
  path: '/media/{media}/found-in'
  defaults:
    _title: 'Found In'
    _controller: '\Drupal\mukurtu_core\Controller\MediaFoundInController::content'
  options:
    _admin_route: TRUE
    parameters:
      media:
        type: entity:media
  requirements:
    _custom_access: '\Drupal\mukurtu_core\Controller\MediaFoundInController::access'

mukurtu_core.front_page:
  path: '/home'
  defaults:
    _title: ''
    _controller: '\Drupal\mukurtu_core\Controller\MukurtuFrontPageController::build'
  requirements:
    _access: 'TRUE'

mukurtu_core.user_settings:
  path: '/admin/config/people/accounts'
  defaults:
    _title: 'Manage user account settings'
  requirements:
    _permission: 'administer account settings'

mukurtu_core.entity.google_tag_container.collection:
  path: '/admin/config/services/google-tag/containers'
  defaults:
    _entity_list: 'google_tag_container'
    _title: 'Google Tag containers'
  requirements:
    _custom_access: '\Drupal\google_tag\GoogleTagController::containerListingAccess'

mukurtu_core.access_denied:
  path: '/mukurtu/access-denied'
  defaults:
    _controller: '\Drupal\mukurtu_core\Controller\AccessDeniedPageController::build'
    _title_callback: '\Drupal\mukurtu_core\Controller\AccessDeniedPageController::getTitle'
  requirements:
    _access: 'TRUE'

mukurtu_core.access_denied_settings:
  path: '/admin/config/mukurtu/access-denied'
  defaults:
    _form: '\Drupal\mukurtu_core\Form\AccessDeniedSettingsForm'
    _title: 'Access Denied Page Settings'
  requirements:
    _permission: 'administer mukurtu access denied page'
