field.widget.settings.geofield_mukurtu:
  type: field.widget.settings.leaflet_widget_default
  label: 'Geofield (WKT) settings'

field.widget.settings.mukurtu_leaflet_formatter:
  type: mapping
  label: 'Mukurtu Leaflet widget settings'
  mapping:
    map:
      type: mapping
      label: 'Map'
      mapping:
        leaflet_map:
          type: string
          label: 'Leaflet map'
        height:
          type: integer
          label: 'Height'
        auto_center:
          type: integer
          label: 'Automatically center map'
        map_position:
          type: mapping
          label: 'Map Position'
          mapping:
            force:
              type: boolean
              label: 'Force'
            center:
              type: mapping
              label: 'Center'
              mapping:
                lat:
                  type: float
                  label: 'Lat'
                lon:
                  type: float
                  label: 'Lon'
            zoomControlPosition:
              type: string
              label: 'Position'
            zoom:
              type: integer
              label: 'Zoom'
            minZoom:
              type: integer
              label: 'Min zoom'
            maxZoom:
              type: integer
              label: 'Max zoom'
            zoomFiner:
              type: integer
              label: 'Zoom finer'
        scroll_zoom_enabled:
          type: integer
          label: 'Scroll zoom enabled'
    input:
      type: mapping
      label: 'Input'
      mapping:
        show:
          type: boolean
          label: 'Show'
        readonly:
          type: boolean
          label: 'Read only'
    toolbar:
      type: mapping
      label: 'Toolbar'
      mapping:
        position:
          type: string
          label: 'Position'
        marker:
          type: string
          label: 'Marker'
        drawMarker:
          type: boolean
          label: 'Draw marker'
        drawPolyline:
          type: boolean
          label: 'Draw Polyline'
        drawRectangle:
          type: boolean
          label: 'Draw Rectangle'
        drawPolygon:
          type: boolean
          label: 'Draw Polygon'
        drawCircle:
          type: boolean
          label: 'Draw Circle'
        drawCircleMarker:
          type: boolean
          label: 'Draw Circle Marker'
        drawText:
          type: boolean
          label: 'Draw Text'
        editMode:
          type: boolean
          label: 'Edit Mode'
        dragMode:
          type: boolean
          label: 'Drag Mode'
        cutPolygon:
          type: boolean
          label: 'Cut Polygon'
        removalMode:
          type: boolean
          label: 'Removal Mode'
        rotateMode:
          type: boolean
          label: 'Rotate Mode'
    reset_map:
      type: mapping
      label: 'Reset Map View'
      mapping:
        control:
          type: boolean
          label: 'Control'
        options:
          type: text
          label: 'Options'
    map_scale:
      type: mapping
      label: 'Map Scale Control'
      mapping:
        control:
          type: boolean
          label: 'Control'
        options:
          type: text
          label: 'Options'
    fullscreen:
      type: mapping
      label: 'Leaflet Fullscreen'
      mapping:
        control:
          type: boolean
          label: 'Control'
        options:
          type: text
          label: 'Options'
    path:
      type: text
      label: 'Path'
    locate:
      type: mapping
      label: 'Locate User Position'
      mapping:
        control:
          type: boolean
          label: 'Control'
        options:
          type: text
          label: 'Options'
        automatic:
          type: boolean
          label: 'Automatically locate user current position'
    geocoder:
      type: mapping
      label: 'Geocoder'
      mapping:
        control:
          type: boolean
          label: 'Enable Geocoder map control'
        settings:
          type: mapping
          label: 'Geocoder settings'
          mapping:
            set_marker:
              type: boolean
              label: 'Marker'
            popup:
              type: boolean
              label: 'Popup'
            autocomplete:
              type: mapping
              label: 'Autocomplete'
              mapping:
                placeholder:
                  type: string
                  label: 'Placeholder'
                title:
                  type: string
                  label: 'Title'
            position:
              type: string
              label: 'Position'
            input_size:
              type: integer
              label: 'Input size'
            providers:
              type: sequence
              label: 'Providers'
              sequence:
                type: mapping
                label: 'Provider'
                mapping:
                  weight:
                    type: integer
                    label: 'Weight'
                  checked:
                    type: boolean
                    label: 'Checked'
            min_terms:
              type: integer
              label: 'Minimum terms'
            delay:
              type: integer
              label: 'Delay'
            zoom:
              type: integer
              label: 'Zoom'
            options:
              type: string
              label: 'Options'

field.formatter.settings.mukurtu_leaflet_formatter:
  type: field.formatter.settings.leaflet_formatter_default
  label: 'Mukurtu leaflet format settings'

