mukurtu_media.settings:
  type: config_object
  label: 'Mukurtu Media settings'
  mapping:
    mukurtu_media_download_enabled:
      type: boolean
      label: 'Enable media download button'
    restricted_media_placeholder:
      type: sequence
      label: 'Restricted media placeholder image.'
      sequence:
        type: string
        label: 'File fid.'
    no_media_placeholder:
      type: sequence
      label: 'No media placeholder image.'
      sequence:
        type: string
        label: 'File fid.'

mukurtu_thumbnail.settings:
  type: config_object
  label: 'Mukurtu Thumbnail Settings'
  mapping:
    default_thumbnail:
      type: sequence
      label: 'Default thumbnails for media bundles.'
      sequence:
        type: string
        label: 'Thumbnail fid.'
