mukurtu_media.bulk_upload:
  path: '/admin/content/media/bulk-upload/{media_type}'
  defaults:
    _form: 'Drupal\mukurtu_media\Form\BulkMediaUploadForm'
    _title_callback: 'Drupal\mukurtu_media\Form\BulkMediaUploadForm::getTitle'
  requirements:
    _permission: 'create media'
  options:
    parameters:
      media_type:
        type: 'string'

mukurtu_media.bulk_create:
  path: '/admin/content/media/bulk-create/{media_type}'
  defaults:
    _form: 'Drupal\mukurtu_media\Form\BulkMediaUrlCreateForm'
    _title_callback: 'Drupal\mukurtu_media\Form\BulkMediaUrlCreateForm::getTitle'
  requirements:
    _permission: 'create media'
  options:
    parameters:
      media_type:
        type: 'string'

mukurtu_media.thumbnail_settings_form:
  path: '/admin/config/system/mukurtu-media-thumbnail-settings'
  defaults:
    _title: 'Mukurtu Media default thumbnail settings'
    _form: 'Drupal\mukurtu_media\Form\ThumbnailSettingsForm'
  requirements:
    _permission: 'administer mukurtu_media configuration'
