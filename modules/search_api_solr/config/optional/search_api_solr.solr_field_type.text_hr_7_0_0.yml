langcode: en
status: true
dependencies:
  module:
    - search_api_solr
    - language
  config:
    - language.entity.hr
id: text_hr_7_0_0
label: 'Croatian Text Field'
minimum_solr_version: 7.0.0
custom_code: ''
field_type_language_code: hr
domains: {}
field_type:
  name: text_hr
  class: solr.TextField
  positionIncrementGap: 100
  storeOffsetsWithPositions: true
  analyzers:
    -
      type: index
      charFilters:
        -
          class: solr.MappingCharFilterFactory
          mapping: accents_hr.txt
      tokenizer:
        class: solr.StandardTokenizerFactory
      filters:
        -
          class: solr.WordDelimiterGraphFilterFactory
          catenateNumbers: 0
          generateNumberParts: 0
          protected: protwords_hr.txt
          splitOnCaseChange: 1
          generateWordParts: 1
          preserveOriginal: 1
          catenateAll: 0
          catenateWords: 0
        -
          class: solr.FlattenGraphFilterFactory
        -
          class: solr.LowerCaseFilterFactory
        -
          class: solr.StopFilterFactory
          ignoreCase: true
          words: stopwords_hr.txt
        -
          class: solr.SnowballPorterFilterFactory
          # https://www.drupal.org/project/search_api_solr/issues/2894527
          # Using the Porter Stemmer but without any language?
          # We're using it on two projects now and well ... it works and is better than having nothing.
        -
          class: solr.RemoveDuplicatesTokenFilterFactory
    -
      type: query
      charFilters:
        -
          class: solr.MappingCharFilterFactory
          mapping: accents_hr.txt
      tokenizer:
        class: solr.StandardTokenizerFactory
      filters:
        -
          class: solr.WordDelimiterGraphFilterFactory
          catenateNumbers: 0
          generateNumberParts: 0
          protected: protwords_hr.txt
          splitOnCaseChange: 0
          generateWordParts: 1
          preserveOriginal: 1
          catenateAll: 0
          catenateWords: 0
        -
          class: solr.LengthFilterFactory
          min: 2
          max: 100
        -
          class: solr.LowerCaseFilterFactory
        -
          class: solr.StopFilterFactory
          ignoreCase: true
          words: stopwords_hr.txt
        -
          class: solr.SynonymGraphFilterFactory
          synonyms: synonyms_hr.txt
          expand: true
          ignoreCase: true
        -
          class: solr.SnowballPorterFilterFactory
          # https://www.drupal.org/project/search_api_solr/issues/2894527
          # Using the Porter Stemmer but without any language?
          # We're using it on two projects now and well ... it works and is better than having nothing.
        -
          class: solr.RemoveDuplicatesTokenFilterFactory
