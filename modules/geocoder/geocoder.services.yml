services:
  geocoder:
    class: Drupal\geocoder\Geocoder
    arguments:
      [
        "@config.factory",
        "@plugin.manager.geocoder.provider",
        "@module_handler",
      ]
  Drupal\geocoder\GeocoderInterface: '@geocoder'

  geocoder.http_adapter:
    class: Http\Adapter\Guzzle7\Client
    arguments: ["@http_client"]

  plugin.manager.geocoder.provider:
    class: Drupal\geocoder\ProviderPluginManager
    parent: default_plugin_manager
    arguments:
      [
        "@string_translation",
        "@renderer",
        "@link_generator",
        "@entity_type.manager",
        "@messenger",
      ]
  Drupal\geocoder\ProviderPluginManager: '@plugin.manager.geocoder.provider'

  plugin.manager.geocoder.dumper:
    class: Drupal\geocoder\DumperPluginManager
    parent: default_plugin_manager
    arguments: ["@country_manager", "@messenger"]
  Drupal\geocoder\DumperPluginManager: '@plugin.manager.geocoder.dumper'

  plugin.manager.geocoder.formatter:
    class: Drupal\geocoder\FormatterPluginManager
    parent: default_plugin_manager
  Drupal\geocoder\FormatterPluginManager: '@plugin.manager.geocoder.formatter'

  cache.geocoder:
    class: Drupal\Core\Cache\CacheBackendInterface
    tags:
      - { name: cache.bin }
    factory: cache_factory:get
    arguments: [geocoder]

  geocoder.throttle:
    class: Drupal\geocoder\GeocoderThrottle
  Drupal\geocoder\GeocoderThrottleInterface: '@geocoder.throttle'
