services:
  mukurtu_local_contexts.group_alias_param_converter:
    class: Drupal\mukurtu_local_contexts\ParamConverter\GroupAliasParamConverter
    arguments: ['@path_alias.manager', '@entity_type.manager']
    tags:
      - { name: paramconverter }

  mukurtu_local_contexts.supported_project_manager:
    class: Drupal\mukurtu_local_contexts\LocalContextsSupportedProjectManager
    arguments: ['@database']
  mukurtu_local_contexts.event_subscriber:
    class: Drupal\mukurtu_local_contexts\EventSubscriber\MukurtuLocalContextsProjectReferenceUpdatedSubscriber
    arguments: ['@messenger']
    tags:
      - { name: event_subscriber }
  mukurtu_local_contexts.cron:
    class: Drupal\mukurtu_local_contexts\Cron\MukurtuLocalContextsCron
    arguments:
      - '@config.factory'
      - '@state'
      - '@logger.channel.cron'
      - '@entity_type.manager'
    tags:
      - { name: cron }
