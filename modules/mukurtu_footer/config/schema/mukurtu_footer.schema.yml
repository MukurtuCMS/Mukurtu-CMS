mukurtu_footer.settings:
  type: config_object
  label: 'Mukurtu Footer settings'
  mapping:
    text_field:
      type: mapping
      label: 'Footer text'
      mapping:
        value:
          type: text
          label: 'Text'
        format:
          type: string
          label: 'Text format'
    logos:
      type: sequence
      label: 'Logos'
      sequence:
        type: mapping
        label: 'Logo'
        mapping:
          fid:
            type: integer
            label: 'File ID'
          alt:
            type: string
            label: 'Alt text'
          link_url:
            type: string
            label: 'Link URL'
    social_accounts:
      type: sequence
      label: 'Social media accounts'
      sequence:
        type: mapping
        label: 'Social account'
        mapping:
          platform:
            type: string
            label: 'Platform'
          url:
            type: string
            label: 'Profile URL'
          label:
            type: string
            label: 'Display label'
    other_links:
      type: sequence
      label: 'Other links'
      sequence:
        type: mapping
        label: 'Link'
        mapping:
          url:
            type: string
            label: 'URL'
          label:
            type: string
            label: 'Label'
    contact_email_text:
      type: string
      label: 'Contact email link text'
    contact_email_address:
      type: string
      label: 'Contact email address'
    copyright_message:
      type: string
      label: 'Copyright message'

# Block plugin settings schema — block config is now minimal (no content fields).
block.settings.mukurtu_footer:
  type: block_settings
  label: 'Mukurtu Footer'
  mapping: {  }
