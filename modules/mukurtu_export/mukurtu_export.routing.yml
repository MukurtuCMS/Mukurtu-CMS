mukurtu_export.export_settings:
  path: '/admin/export/settings'
  defaults:
    _title: 'Export Settings'
    _form: 'Drupal\mukurtu_export\Form\ExportSettingsForm'
  requirements:
    _permission: 'access mukurtu export'
    _custom_access: '\Drupal\mukurtu_export\Form\ExportSettingsForm::access'

mukurtu_export.export_results:
  path: '/admin/export/results'
  defaults:
    _title: 'Export Results'
    _form: 'Drupal\mukurtu_export\Form\ExportResultsForm'
  requirements:
    _permission: 'access mukurtu export'
    _custom_access: '\Drupal\mukurtu_export\Form\ExportResultsForm::access'


mukurtu_export.start_list_export:
  path: '/admin/export/start/{export_list}'
  defaults:
    _controller: 'Drupal\mukurtu_export\Controller\ExportListStartController::start'
    _title: 'Start Export'
  requirements:
    _permission: 'access mukurtu export'
  options:
    parameters:
      export_list:
        type: entity:export_list

mukurtu_export.add_item_to_list:
  path: '/admin/export/add-item/{entity_type}/{entity_id}'
  defaults:
    _title: 'Add to Export List'
    _form: 'Drupal\mukurtu_export\Form\ExportListAddItemForm'
  requirements:
    _permission: 'access mukurtu export'

mukurtu_export.start_adhoc_node:
  path: '/admin/export/start-adhoc/{node}'
  defaults:
    _title: 'Export'
    _controller: 'Drupal\mukurtu_export\Controller\AdHocExportStartController::startNode'
  options:
    parameters:
      node:
        type: entity:node
  requirements:
    _permission: 'access mukurtu export'

mukurtu_export.start_adhoc_bulk:
  path: '/admin/export/start-adhoc-bulk/{view_id}/{display_id}'
  defaults:
    _title: 'Export'
    _controller: 'Drupal\mukurtu_export\Controller\AdHocExportStartController::startBulk'
  requirements:
    _permission: 'access mukurtu export'

mukurtu_export.add_items_to_list:
  path: '/admin/export/add-items/{view_id}/{display_id}'
  defaults:
    _title: 'Add to Export List'
    _form: 'Drupal\mukurtu_export\Form\ExportListAddItemsForm'
  requirements:
    _permission: 'access mukurtu export'

mukurtu_export.remove_items_from_list:
  path: '/admin/export/remove-items/{view_id}/{display_id}'
  defaults:
    _title: 'Remove from Export List'
    _form: 'Drupal\mukurtu_export\Form\ExportListRemoveItemsForm'
  requirements:
    _permission: 'access mukurtu export'

mukurtu_export.add_node_to_list:
  path: '/admin/export/add-node/{node}'
  defaults:
    _title: 'Add to Export List'
    _form: 'Drupal\mukurtu_export\Form\ExportListAddNodeForm'
  options:
    parameters:
      node:
        type: entity:node
  requirements:
    _permission: 'access mukurtu export'

mukurtu_export.csv_exporter.duplicate:
  path: '/admin/export/format/csv/manage/{csv_exporter}/duplicate'
  defaults:
    _controller: 'Drupal\mukurtu_export\Controller\CsvExporterController::duplicate'
    _title: 'Duplicate Export Settings'
  options:
    parameters:
      csv_exporter:
        type: entity:csv_exporter
  requirements:
    _permission: 'access mukurtu export'

mukurtu_export.remove_node_from_list:
  path: '/admin/export/remove-node/{node}'
  defaults:
    _title: 'Remove from Export List'
    _form: 'Drupal\mukurtu_export\Form\ExportListRemoveNodeForm'
  options:
    parameters:
      node:
        type: entity:node
  requirements:
    _permission: 'access mukurtu export'

mukurtu_export.start_adhoc_media:
  path: '/admin/export/start-adhoc-media/{media}'
  defaults:
    _title: 'Export'
    _controller: 'Drupal\mukurtu_export\Controller\AdHocExportStartController::startMedia'
  options:
    parameters:
      media:
        type: entity:media
  requirements:
    _permission: 'access mukurtu export'

mukurtu_export.remove_media_from_list:
  path: '/admin/export/remove-media/{media}'
  defaults:
    _title: 'Remove from Export List'
    _form: 'Drupal\mukurtu_export\Form\ExportListRemoveMediaForm'
  options:
    parameters:
      media:
        type: entity:media
  requirements:
    _permission: 'access mukurtu export'

mukurtu_export.taxonomy_export_start:
  path: '/admin/export/taxonomy'
  defaults:
    _title: 'Export Taxonomy'
    _form: 'Drupal\mukurtu_export\Form\TaxonomyExportStartForm'
  requirements:
    _permission: 'access mukurtu export'
