                audited page inventory, including protocol-gated member
                views. Map location markers previously rendered as focusable
                buttons with no accessible name were fixed (July 2026).
                Keyboard and screen reader verification of custom widgets
                (carousel, tabs, audio player, autocomplete) is part of the
                manual audit cycle.
          - name: authoring-tool
            adherence:
              level: partially-supports
              notes: >-
                July 2026 scans of pages rendered with the administration
                toolbar found toolbar menu buttons and links with no
                accessible name and an invalid ARIA attribute on toolbar
                menus. These originate in the upstream Drupal core/Gin
                admin toolbar and affect authenticated administrators and
                authors only; upstream verification and issue links are
                tracked in the project's accessibility findings. The full
                authoring interface will be evaluated in a later phase.
