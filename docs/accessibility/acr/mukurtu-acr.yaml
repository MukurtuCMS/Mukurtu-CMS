title: Mukurtu CMS Accessibility Conformance Report
product:
  name: Mukurtu CMS
  version: "4"
  description: >-
    Mukurtu CMS is a free, mobile, and open source platform built with
    Indigenous communities to manage and share digital cultural heritage.
    It is a distribution of the Drupal content management system.
author:
  name: "Mukurtu CMS Development Team"
  company_name: "Center for Digital Scholarship and Curation, Washington State University"
  address: ""
  email: "support@mukurtu.org"
  phone: ""
  website: "https://mukurtu.org"
report_date: "2026-07-10"
last_modified_date: "2026-07-16"
version: 2
notes: >-
  This is a living document maintained as part of the Mukurtu CMS
  accessibility program (see docs/accessibility/README.md in the Mukurtu CMS
  repository). All criteria begin as not-evaluated and are updated as audit
  findings are triaged. Assessments reflect Mukurtu CMS itself (its
  installation profile, custom modules, and the mukurtu_v4 theme); conformance
  of an individual Mukurtu site also depends on its content and configuration.
evaluation_methods_used: >-
  Automated scanning with axe-core (via Playwright) across a representative
  page inventory, combined with manual keyboard-only testing and screen reader
  testing (NVDA, VoiceOver, or Orca) following the program's manual testing
  checklist. Findings are consolidated by WCAG Success Criterion before
  conformance levels are assigned.
legal_disclaimer: >-
  The information herein is provided in good faith based on the analysis of
  the product at the time of the review and does not represent a
  legally-binding claim. Please contact us to report any accessibility errors
  or conformance claim errors for re-evaluation and correction, if necessary.
repository: "https://github.com/MukurtuCMS/Mukurtu-CMS"
feedback: "https://github.com/MukurtuCMS/Mukurtu-CMS/issues"
license: GPL-2.0-or-later
related_openacrs:
  - url: "https://github.com/GSA/openacr/blob/main/openacr/drupal-9.yaml"
    type: secondary
chapters:
  success_criteria_level_a:
    notes: >-
      Mukurtu CMS is a Drupal distribution. The "Web" component below covers
      the visitor and logged-in member experience (the current audit scope).
      The "Authoring Tool" component covers the content creation and
      administration experience, which will be evaluated in a later phase
      against ATAG 2.0 in addition to WCAG.
    criteria:
      - num: 1.1.1
        components:
          - name: web
            adherence:
              level: supports
              notes: >-
                Automated checks (axe-core, July 2026) across the audited page
                inventory found no missing text alternatives. Map location
                markers previously exposed as unnamed buttons were fixed to
                carry the name of the item whose location they show. Alt text
                quality on real site content is author-dependent and is
                reviewed in the manual audit cycle.
          - name: authoring-tool
            adherence:
              level: not-evaluated
              notes: ""
