name: Mukurtu CMS 4 Theme
type: theme
description: 'The default theme for Mukurtu CMS.'
core_version_requirement: '^9.4 || ^10 || ^11'
base theme: false
logo: logo.png
libraries:
  - mukurtu_v4/global-styling

libraries-override:
  facets/soft-limit:
    js:
      js/soft-limit.js: js/facets-soft-limit.js

regions:
  user_menu: 'User menu'
  header: 'Header'
  breadcrumb: 'Breadcrumb'
  highlighted: 'Highlighted'
  help: 'Help'
  page_title: 'Page Title'
  sidebar_first: 'Left sidebar'
  content: 'Content'
  sidebar_second: 'Right sidebar'
  footer: 'Footer'
